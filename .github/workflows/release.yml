name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: pim-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: pim-darwin-arm64
          - goos: linux
            goarch: amd64
            artifact: pim-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: pim-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: pim-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ needs.release.outputs.version }}" \
            -o "${{ matrix.artifact }}" \
            ./cmd/pim

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  licence-report:
    name: Third-Party Licence Report
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Generate THIRD_PARTY_NOTICES.txt
        run: go-licenses report ./... --template .go-licenses.tpl > THIRD_PARTY_NOTICES.txt 2>/dev/null || go-licenses report ./... > THIRD_PARTY_NOTICES.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: THIRD_PARTY_NOTICES
          path: THIRD_PARTY_NOTICES.txt

  publish:
    name: Publish Release
    needs: [release, build, licence-report]
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              echo "Uploading $file to release $tag"
              gh release upload "$tag" "$file" \
                --repo "${{ github.repository }}" \
                --clobber
            done
          done
